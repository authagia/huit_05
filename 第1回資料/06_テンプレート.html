<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>私の自己紹介ページ</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      line-height: 1.6;
    }
    h1 {
      color: #333;
      border-bottom: 2px solid #4CAF50;
      padding-bottom: 10px;
    }
    .profile {
      background: #f9f9f9;
      padding: 20px;
      border-radius: 8px;
      margin: 20px 0;
    }
    .name {
      font-size: 1.5em;
      font-weight: bold;
      color: #4CAF50;
    }
    .favorite {
      margin-top: 15px;
    }
    .favorite strong {
      display: block;
      color: #666;
      font-size: 0.9em;
    }
  </style>
  <style>
    /* 次回予告のアニメーション */
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.8; }
    }
    .next-preview {
      animation: pulse 2s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <h1>自己紹介</h1>
  
  <div class="profile">
    <div class="name">名前</div>
    <p>こんにちは！ここに自己紹介を書いてください。</p>
    
    <div class="favorite">
      <strong>好きなこと</strong>
      <span>ここに好きなことを書いてください</span>
    </div>
    
    <div class="favorite">
      <strong>最近の趣味</strong>
      <span>ここに最近の趣味を書いてください</span>
    </div>
  </div>
  
  <hr>
  <p><small>Created at 第1回 Web系勉強会</small></p>

  <!-- ========================
       次回への予告：もっと知りたい人は试试！
       ======================== -->
  <details class="next-preview" style="margin-top: 30px; padding: 15px; border: 2px dashed #4CAF50; border-radius: 8px;">
    <summary style="cursor: pointer; font-weight: bold; color: #4CAF50;">
      🌟 次回予告：もっと自由にカスタマイズしよう
    </summary>
    <div style="margin-top: 15px;">
      <p><strong>第2回では、こんなことを学びます：</strong></p>
      <ul style="line-height: 2;">
        <li>CSSで本格的なデザイン（アニメーション、レスポンシブ）</li>
        <li>JavaScriptでインタラクティブな機能</li>
        <li>画像を載せる方法</li>
        <li>フォントや配色をプロっぽくするテクニック</li>
      </ul>
      <p style="background: #fff3cd; padding: 10px; border-radius: 4px;">
        💡 <strong>ヒント</strong>: 今のHTMLを自分色に染めてみると、次回がより楽しくなります！
      </p>
    </div>
  </details>
</body>
</html>
