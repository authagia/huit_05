<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>私の自己紹介ページ</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      line-height: 1.6;
    }
    h1 {
      color: #333;
      border-bottom: 2px solid #4CAF50;
      padding-bottom: 10px;
    }
    .profile {
      background: #f9f9f9;
      padding: 20px;
      border-radius: 8px;
      margin: 20px 0;
    }
    .name {
      font-size: 1.5em;
      font-weight: bold;
      color: #4CAF50;
    }
    .favorite {
      margin-top: 15px;
    }
    .favorite strong {
      display: block;
      color: #666;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <h1>自己紹介</h1>
  
  <div class="profile">
    <div class="name">名前</div>
    <p>こんにちは！ここに自己紹介を書いてください。</p>
    
    <div class="favorite">
      <strong>好きなこと</strong>
      <span>ここに好きなことを書いてください</span>
    </div>
    
    <div class="favorite">
      <strong>最近の趣味</strong>
      <span>ここに最近の趣味を書いてください</span>
    </div>
  </div>
  
  <hr>
  <p><small>Created at 第1回 Web系勉強会</small></p>
</body>
</html>
