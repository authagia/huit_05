<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>マイ・オリジナル・クリッカー</title>
    <style>
        /* ==========================================
           🎨 【デザインカスタマイズのエリア】
           ここを自由に変えて、世界に一つだけのゲームにしよう！
           ========================================== */
        body {
            text-align: center;
            font-family: 'Helvetica Neue', sans-serif;
            background: #eef2f3;
            /* 背景色 */
            color: #333;
            /* 文字の色 */
            padding-top: 50px;
        }

        /* クリックボタンのデザイン */
        #click-btn {
            font-size: 100px;
            cursor: pointer;
            background: none;
            border: none;
            outline: none;
            transition: transform 0.1s;
            /* 変化をなめらかに */
        }

        /* ボタンを押した瞬間の動き */
        #click-btn:active {
            transform: scale(0.9);
            /* 少し小さくする */
        }

        .score-board {
            font-size: 28px;
            margin: 20px;
            font-weight: bold;
        }

        /* 強化アイテムボタンのデザイン */
        .shop-area {
            margin-top: 40px;
        }

        .upgrade-btn {
            font-size: 18px;
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        /* ボタンが無効（コインが足りない）の時の見た目 */
        .upgrade-btn:disabled {
            background: #aaaaaa;
            cursor: not-allowed;
        }
    </style>
</head>

<body>

    <h1 id="game-title">🪙 コインクリッカー 🪙</h1>

    <div class="score-board">
        持っているコイン: <span id="coin-count">0</span> 枚
    </div>

    <button id="click-btn">🪙</button>

    <div class="shop-area">
        <button id="upgrade-btn" class="upgrade-btn">
            自動化アイテムを購入（コスト: 10枚）
        </button>
        <div style="font-size: 16px; margin-top: 10px; color: #666;">
            現在の自動増加量: +<span id="auto-count">0</span>枚 / 秒
        </div>
    </div>

    <script>
        // 要素を取得する
        const coinCountEl = document.querySelector("#coin-count");
        const clickBtn = document.querySelector("#click-btn");
        const upgradeBtn = document.querySelector("#upgrade-btn");
        const autoCountEl = document.querySelector("#auto-count");

        // ==========================================
        // 📦 状態（データ）の管理
        // ==========================================
        let coin = Number(localStorage.getItem("savedCoinCount")) || 0;
        let autoCPS = Number(localStorage.getItem("savedAutoCPS")) || 0; // 1秒あたりの自動増加量
        const itemCost = 10; // アイテムの価格

        // 画面を更新する関数
        function updateUI() {
            coinCountEl.textContent = coin;
            autoCountEl.textContent = autoCPS;
            checkShopButton();
        }

        // データを保存する関数
        function saveGame() {
            localStorage.setItem("savedCoinCount", coin);
            localStorage.setItem("savedAutoCPS", autoCPS);
        }

        // coin を増やす関数（関数化された共有ロジック）
        function plusCoin(amount = 1) {
            coin += amount;
            saveGame();
            updateUI();
        }

        // コインの枚数に応じてショップボタンを切り替える関数
        function checkShopButton() {
            upgradeBtn.disabled = coin < itemCost;
        }

        // 起動時の表示を更新
        updateUI();

        // ==========================================
        // 🖱️ 手動クリックの処理
        // ==========================================
        clickBtn.addEventListener("click", () => {
            plusCoin(1);
        });

        // ==========================================
        // 🛒 アイテム購入ロジック
        // ==========================================
        upgradeBtn.addEventListener("click", () => {
            if (coin >= itemCost) {
                coin -= itemCost;
                autoCPS += 1;
                saveGame();
                updateUI();
            }
        });

        // ==========================================
        // 🕒 タイマーによる自動増加
        // ==========================================
        setInterval(() => {
            if (autoCPS > 0) {
                plusCoin(autoCPS);
            }
        }, 1000); // 1000ミリ秒（1秒）ごとに実行
    </script>
</body>

</html>
